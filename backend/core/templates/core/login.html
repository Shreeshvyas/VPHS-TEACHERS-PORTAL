{% extends 'core/base.html' %}
{% load static %}

{% block title %}Login - Teacher Portal{% endblock %}

{% block content %}
<div class="login-card">
    <div class="login-header">
        <div class="logo-icon login-logo">T</div>
        <h2>Welcome Back</h2>
        <p>Sign in to access your Teacher Portal</p>
    </div>
    
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" required id="id_password" class="form-control" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; height: 44px;">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
    </form>
</div>

<script>
    // Add classes for login body
    document.body.classList.add('login-body');
</script>
{% endblock %}
